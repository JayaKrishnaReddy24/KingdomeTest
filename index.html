<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom Pub | Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body * { visibility: hidden; }
            #ticket-section, #ticket-section * { visibility: visible; }
            #ticket-section { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none; }
        }
    </style>
</head>
<body class="bg-black text-white font-sans">

    <header class="p-6 border-b border-gray-800 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-yellow-500">KINGDOM PUB</h1>
        <button onclick="location.reload()" class="text-sm bg-gray-900 px-4 py-2 rounded">Home</button>
    </header>

    <main class="max-w-2xl mx-auto p-6">
        
        <div id="admin-section" class="space-y-6">
            <h2 class="text-xl font-semibold">Create New Event</h2>
            <div class="space-y-4 bg-gray-900 p-6 rounded-lg border border-gray-800">
                <div>
                    <label class="block text-sm text-gray-400">Event Name</label>
                    <input type="text" id="eventName" placeholder="e.g. Saturday Night Live" class="w-full bg-black border border-gray-700 p-3 rounded mt-1 focus:border-yellow-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm text-gray-400">Entry Price (₹)</label>
                    <input type="number" id="eventPrice" placeholder="500" class="w-full bg-black border border-gray-700 p-3 rounded mt-1 focus:border-yellow-500 outline-none">
                </div>
                <button onclick="publishEvent()" id="publishBtn" class="w-full bg-yellow-500 text-black font-bold py-3 rounded hover:bg-yellow-400 transition">
                    PUBLISH EVENT
                </button>
            </div>

            <div class="mt-10">
                <h2 class="text-xl font-semibold mb-4">Live Events</h2>
                <div id="events-container" class="grid gap-4">
                    <p class="text-gray-500">Loading events...</p>
                </div>
            </div>
        </div>

        <div id="ticket-section" class="hidden">
            <div class="bg-white text-black p-8 rounded-none border-4 border-double border-black max-w-sm mx-auto shadow-2xl">
                <div class="text-center border-b-2 border-black pb-4 mb-4">
                    <h3 class="text-lg font-black italic">KINGDOM PUB</h3>
                    <p class="text-xs tracking-widest uppercase">Official Entry Pass</p>
                </div>
                
                <div class="space-y-4 py-4">
                    <div>
                        <p class="text-[10px] uppercase font-bold text-gray-500">Event</p>
                        <h1 id="ticketTitle" class="text-2xl font-bold leading-tight">EVENT NAME</h1>
                    </div>
                    <div class="flex justify-between">
                        <div>
                            <p class="text-[10px] uppercase font-bold text-gray-500">Price</p>
                            <p id="ticketPriceDisplay" class="font-bold text-lg">₹0.00</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] uppercase font-bold text-gray-500">Date</p>
                            <p id="ticketDate" class="font-bold">--/--/--</p>
                        </div>
                    </div>
                </div>

                <div class="mt-6 pt-4 border-t-2 border-dashed border-gray-300 text-center">
                    <p class="text-[10px] text-gray-400 mb-4">Non-refundable • Valid for one entry</p>
                    <div class="no-print space-y-2">
                        <button onclick="window.print()" class="w-full bg-black text-white py-2 font-bold rounded">PRINT TICKET</button>
                        <button onclick="location.reload()" class="w-full border border-black py-2 text-sm font-medium rounded">CREATE ANOTHER</button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // CONFIGURATION
        const SB_URL = 'https://zlprzfbqxzldlchyophw.supabase.co'; // Clean URL
        const SB_KEY = 'YOUR_SUPABASE_ANON_KEY'; // PASTE YOUR KEY HERE
        
        const _db = supabase.createClient(SB_URL, SB_KEY);

        // 1. Fetch and Display Events on load
        async function fetchEvents() {
            const container = document.getElementById('events-container');
            const { data, error } = await _db
                .from('events')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                container.innerHTML = `<p class="text-red-500">Error loading events</p>`;
                return;
            }

            if (data.length === 0) {
                container.innerHTML = `<p class="text-gray-500 italic">No events live yet.</p>`;
                return;
            }

            container.innerHTML = data.map(event => `
                <div class="bg-gray-900 border border-gray-800 p-4 rounded flex justify-between items-center">
                    <div>
                        <h3 class="font-bold text-yellow-500">${event.name}</h3>
                        <p class="text-sm text-gray-400">Entry: ₹${event.price}</p>
                    </div>
                    <span class="text-[10px] bg-green-900 text-green-300 px-2 py-1 rounded uppercase">Active</span>
                </div>
            `).join('');
        }

        // 2. Publish Event Logic
        async function publishEvent() {
            const name = document.getElementById('eventName').value;
            const price = document.getElementById('eventPrice').value;
            const btn = document.getElementById('publishBtn');

            if (!name || !price) {
                alert("Please fill in all fields");
                return;
            }

            btn.innerText = "PUBLISHING...";
            btn.disabled = true;

            const { data, error } = await _db
                .from('events')
                .insert([{ name: name, price: price }])
                .select();

            if (error) {
                alert("Error: " + error.message);
                btn.innerText = "PUBLISH EVENT";
                btn.disabled = false;
            } else {
                // Success: Show the ticket
                showTicket(data[0]);
                fetchEvents(); // Update list in background
            }
        }

        // 3. UI Switch to Ticket
        function showTicket(event) {
            document.getElementById('ticketTitle').innerText = event.name;
            document.getElementById('ticketPriceDisplay').innerText = "₹" + event.price;
            document.getElementById('ticketDate').innerText = new Date().toLocaleDateString();

            // Hide Form, Show Ticket
            document.getElementById('admin-section').classList.add('hidden');
            document.getElementById('ticket-section').classList.remove('hidden');
        }

        // Initialize
        fetchEvents();
    </script>
</body>
</html>
